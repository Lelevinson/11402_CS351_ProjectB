name: C++ Build and Test

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++

      - name: Build test suite
        run: |
          g++ -std=c++20 -Wall -Wextra -o csv_tests \
            tests/test_csv.cpp \
            src/csv.cpp
          echo "✓ Test suite compiled"

      - name: Run tests
        run: |
          ./csv_tests
          echo "✓ Tests completed"

      - name: Build SELECT test suite
        run: |
          g++ -std=c++20 -Wall -Wextra -o select_tests \
            tests/test_select.cpp \
            src/select.cpp \
            src/where.cpp \
            src/csv.cpp
          echo "✓ SELECT test suite compiled"

      - name: Run SELECT tests
        run: |
          ./select_tests
          echo "✓ SELECT tests completed"

      - name: Build WHERE test suite
        run: |
          g++ -std=c++20 -Wall -Wextra -o where_tests \
            tests/test_where.cpp \
            src/select.cpp \
            src/where.cpp \
            src/csv.cpp
          echo "✓ WHERE test suite compiled"

      - name: Run WHERE tests
        run: |
          ./where_tests
          echo "✓ WHERE tests completed"

      - name: Build INSERT test suite
        run: |
          g++ -std=c++20 -Wall -Wextra -o insert_tests \
            tests/test_insert.cpp \
            src/insert.cpp \
            src/csv.cpp
          echo "✓ INSERT test suite compiled"

      - name: Run INSERT tests
        run: |
          ./insert_tests
          echo "✓ INSERT tests completed"

      - name: Build UPDATE test suite
        run: |
          g++ -std=c++20 -Wall -Wextra -o update_tests \
            tests/test_update.cpp \
            src/update.cpp \
            src/where.cpp \
            src/csv.cpp
          echo "✓ UPDATE test suite compiled"

      - name: Run UPDATE tests
        run: |
          ./update_tests
          echo "✓ UPDATE tests completed"

      - name: Build query demo
        run: |
          g++ -std=c++20 -Wall -Wextra -o csv_query \
            src/main.cpp \
            src/select.cpp \
            src/where.cpp \
            src/insert.cpp \
            src/update.cpp \
            src/csv.cpp
          echo "✓ Query demo compiled"

      - name: Run query demo
        run: |
          ./csv_query data/students.csv "SELECT name, major FROM students"
          ./csv_query data/students.csv "SELECT name FROM students WHERE major = CS"
          cp data/students.csv /tmp/demo.csv
          ./csv_query /tmp/demo.csv "INSERT INTO students VALUES (Dave, 23, Math)"
          ./csv_query /tmp/demo.csv "UPDATE students SET major = Physics WHERE name = Dave"
          ./csv_query /tmp/demo.csv "SELECT name, major FROM students WHERE major = Physics"
          echo "✓ Query demo ran"
